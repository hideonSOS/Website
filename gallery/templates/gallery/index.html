<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ギャラリー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #gallery-img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: {% if latest %}block{% else %}none{% endif %};
    }
    #no-image {
      color: #555;
      font-size: 1.2rem;
      display: {% if latest %}none{% else %}block{% endif %};
    }
  </style>
</head>
<body>
  {% if latest %}
  <img id="gallery-img" src="{{ latest.image.url }}" data-id="{{ latest.pk }}" />
  {% else %}
  <img id="gallery-img" src="" data-id="0" />
  {% endif %}
  <p id="no-image">画像がありません</p>

  <script>
    const img = document.getElementById('gallery-img');
    const noImage = document.getElementById('no-image');
    let currentId = parseInt(img.dataset.id || '0');

    setInterval(() => {
      fetch('/gallery/api/latest/')
        .then(r => r.json())
        .then(data => {
          if (data.id && data.id !== currentId) {
            currentId = data.id;
            img.src = data.url;
            img.style.display = 'block';
            noImage.style.display = 'none';
          }
        })
        .catch(() => {});
    }, 3000);
  </script>
</body>
</html>
