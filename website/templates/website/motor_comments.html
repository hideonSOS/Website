{% extends 'website/base.html' %}
{% load static %}

{% block title %}モーター情報入力{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'website/css/motor_comments.css' %}?v={% now 'U' %}">
{% endblock %}

{% block content %}
  <div class="grid" id="grid" aria-label="100個の正方形グリッド"></div>

  <!-- 投稿一覧モーダル -->
  <dialog id="postsDialog" aria-modal="true">
    <div class="modalHead">
      <div class="modalTitle"><span id="dialogMachine"></span> への投稿を行う</div>
      <a id="openPageLink" class="btn-link" target="_blank" rel="noopener">一覧表示</a>
    </div>
    <div class="modalBody">
      <form id="postForm" class="postForm" novalidate>
        <div class="row">
          <label for="authorInput">投稿者</label>
          <select id="authorInput">
            <option value="スタッフ" selected>スタッフ</option>
            <option value="他">他</option>
          </select>
        </div>
        <div class="row">
          <div class="row">
            <label for="titleInput">レーサー名</label>
            <input type="text" id="titleInput" maxlength="10" placeholder="モーター使用選手を入力" />
          </div>
          <label for="dateInput">入力日</label>
          <input type="date" id="dateInput" />
        </div>
        <label for="titleSelect">開催</label>
        <select id="titleSelect" required>
          <option value="">開催を選択してください</option>
          {% for ev in titles %}
            <option value="{{ ev }}">{{ ev }}</option>
          {% endfor %}
        </select>
        <div class="row">
          <label for="boatInput">使用ボート</label>
          <select id="boatInput">
            <option value="">未選択</option>
          </select>
        </div>
        <div class="row">
          <label for="partsInput">部品交換</label>
          <select id="partsInput">
            <option value="">未選択</option>
            <option value="クランクシャフト">クランクシャフト</option>
            <option value="ピストン×１">ピストン×１</option>
            <option value="ピストン×２">ピストン×２</option>
            <option value="シリンダーケース">シリンダーケース</option>
            <option value="キャブレター">キャブレター</option>
            <option value="ギヤケース">ギヤケース</option>
            <option value="キャリアボデー">キャリアボデー</option>
            <option value="リング×１">リング×１</option>
            <option value="リング×２">リング×２</option>
          </select>
        </div>
        <div class="row">
          <label for="contentInput">コメント</label>
          <textarea id="contentInput" placeholder="モーターに関する情報を入力 ※ 部品交換を入力した場合は空欄可"></textarea>
        </div>
        <div class="row right">
          <button type="submit" id="submitPost">投稿</button>
        </div>
      </form>
      <div id="postsStatus" class="status" role="status">読み込み中...</div>
      <div id="postsList" class="postsList" aria-live="polite"></div>
    </div>
    <div class="modalFoot">
      <button id="closeDialog" type="button">閉じる</button>
    </div>
  </dialog>

  {{ titles|json_script:"titles-data" }}
{% endblock %}

{% block extra_js %}
<script src="{% static 'website/js/motor_comments.js' %}?v={% now 'U' %}"></script>
{% endblock %}
