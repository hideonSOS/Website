{% extends 'website/base.html' %}
{% load static %}

{% block title %}艇国データ{% endblock %}

{% block extra_css %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  .cyber-wrap {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #030810;
    font-family: 'Share Tech Mono', monospace;
    padding: 40px 20px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px);
  }

  .cyber-heading {
    font-family: 'Orbitron', monospace;
    font-size: 2em;
    font-weight: 900;
    color: #00f5ff;
    text-shadow: 0 0 10px #00f5ff, 0 0 30px #00f5ff66;
    letter-spacing: .2em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .cyber-sub {
    font-size: .75em;
    color: #3a5a7a;
    letter-spacing: .15em;
    margin-bottom: 48px;
  }

  .cyber-search {
    display: flex;
    gap: 0;
    align-items: stretch;
    border: 1px solid #00f5ff66;
    border-radius: 4px;
    box-shadow: 0 0 20px #00f5ff22;
  }

  .cyber-search input {
    background: #060f1c;
    color: #00f5ff;
    border: none;
    outline: none;
    padding: 14px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.1em;
    width: 220px;
    letter-spacing: .1em;
  }

  .cyber-search input::placeholder {
    color: #1a3a5a;
  }

  .cyber-search input:focus {
    box-shadow: inset 0 0 12px #00f5ff22;
  }

  .cyber-btn {
    background: #00f5ff18;
    color: #00f5ff;
    border: none;
    border-left: 1px solid #00f5ff44;
    padding: 14px 28px;
    font-family: 'Orbitron', monospace;
    font-size: .75em;
    font-weight: 700;
    letter-spacing: .15em;
    cursor: pointer;
    text-transform: uppercase;
    transition: background .2s, box-shadow .2s;
  }

  .cyber-btn:hover {
    background: #00f5ff33;
    box-shadow: 0 0 14px #00f5ff44;
  }

  .cyber-note {
    margin-top: 20px;
    font-size: .7em;
    color: #1a3a5a;
    letter-spacing: .1em;
  }
</style>
{% endblock %}

{% block content %}
<div class="cyber-wrap">
  <div class="cyber-heading">艇国データ</div>
  <div class="cyber-sub">// BOATRACE DATABASE SEARCH //</div>

  <div class="cyber-search">
    <input type="number" id="regno-input" placeholder="登録番号 (例: 3882)" min="1" max="9999">
    <button class="cyber-btn" onclick="goToRacer()">▶ SEARCH</button>
  </div>

  <div class="cyber-note">// ENTER RACER REGISTRATION NUMBER</div>
</div>

<script>
function goToRacer() {
  var regno = document.getElementById('regno-input').value.trim();
  if (!regno) { alert('登録番号を入力してください'); return; }
  window.location.href = '/TeikokuData/teikoku2/' + regno + '/';
}
document.getElementById('regno-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') goToRacer();
});
</script>
{% endblock %}
